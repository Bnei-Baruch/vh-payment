stages:
  - build
  - upload_sourcemaps
  - deploy

variables:
  STAGING_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  STAGING_LATEST_IMAGE: $CI_REGISTRY_IMAGE:staging
  PROD_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
  PROD_LATEST_IMAGE: $CI_REGISTRY_IMAGE:latest
  STAGING_URL: "/pay/"
  PRODUCTION_URL: "/pay/"

build_staging:
  image: docker:latest
  stage: build
  services:
    - docker:26.0.0-dind
  script:
    - docker system prune -f
    - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY
    - docker build --build-arg PUBLIC_URL=$STAGING_URL --build-arg REACT_APP_COMMIT_SHA=$CI_COMMIT_SHORT_SHA -t $STAGING_IMAGE .
    - docker tag $STAGING_IMAGE $STAGING_LATEST_IMAGE
    - docker push $STAGING_IMAGE
    - docker push $STAGING_LATEST_IMAGE
  only:
    - master

deploy_staging:
  image: gitlab.bbdev.team:5050/vh/buildutils/buildutil:0.8.0
  stage: deploy
  tags:
    - staging
  script:
    - mkdir -p /opt/$CI_PROJECT_PATH || true
    - for variable in "${!DYN_STAGING@}"; do echo "${variable#DYN_STAGING_}"="${!variable}"; export "${variable#DYN_STAGING_}"="${!variable}"; done;
    - gomplate --input-dir=config-templates --output-map="/opt/$CI_PROJECT_PATH/public/config/{{ .in | strings.ReplaceAll \".js\" \"-${CI_COMMIT_SHORT_SHA}.js\" }}"
    - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY
    - IMAGE_NAME=$STAGING_IMAGE docker compose up -d
  only:
    - master


build_production:
  image: docker:latest
  stage: build
  services:
    - docker:26.0.0-dind
  script:
    - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY
    - docker build --build-arg REACT_APP_COMMIT_SHA=$CI_COMMIT_SHORT_SHA --build-arg PUBLIC_URL=$PRODUCTION_URL -t $PROD_IMAGE .
    - docker tag $PROD_IMAGE $PROD_LATEST_IMAGE
    - docker push $PROD_IMAGE
    - docker push $PROD_LATEST_IMAGE

  only:
    - tags

upload_sourcemaps_production:
  image: docker:latest
  stage: upload_sourcemaps
  services:
    - docker:26.0.0-dind
  script:
    - |
      if [ -z "$SENTRY_AUTH_TOKEN" ]; then
        echo "SENTRY_AUTH_TOKEN not set, skipping source map upload"
        exit 0
      fi
    - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY
    - docker pull $PROD_IMAGE
    - docker create --name sourcemap_extract $PROD_IMAGE
    - mkdir -p build
    - docker cp sourcemap_extract:/usr/share/nginx/html/. build/
    - docker rm sourcemap_extract
    - wget -q -O /usr/local/bin/sentry-cli https://github.com/getsentry/sentry-cli/releases/latest/download/sentry-cli-Linux-x86_64 && chmod +x /usr/local/bin/sentry-cli
    - SENTRY_URL=$SENTRY_URL SENTRY_AUTH_TOKEN=$SENTRY_AUTH_TOKEN sentry-cli releases new --org kbb --project vh-payment --finalize "$CI_COMMIT_TAG"
    - SENTRY_URL=$SENTRY_URL SENTRY_AUTH_TOKEN=$SENTRY_AUTH_TOKEN sentry-cli releases set-commits "$CI_COMMIT_TAG" --auto
    - SENTRY_URL=$SENTRY_URL SENTRY_AUTH_TOKEN=$SENTRY_AUTH_TOKEN sentry-cli sourcemaps upload --org kbb --project vh-payment --release "$CI_COMMIT_TAG" --url-prefix '~/pay' --legacy $(pwd)/build
          
  only:
    - tags

deploy_production:
  image: gitlab.bbdev.team:5050/vh/buildutils/buildutil:0.8.0
  stage: deploy
  tags:
    - production
  script:
    - mkdir -p /opt/$CI_PROJECT_PATH || true
    - for variable in "${!DYN_PROD@}"; do echo "${variable#DYN_PROD_}"="${!variable}"; export "${variable#DYN_PROD_}"="${!variable}"; done;
    - gomplate --input-dir=config-templates --output-map="/opt/$CI_PROJECT_PATH/public/config/{{ .in | strings.ReplaceAll \".js\" \"-${CI_COMMIT_SHORT_SHA}.js\" }}"
    - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY
    - IMAGE_NAME=$PROD_IMAGE docker compose up -d
  only:
    - tags
  when: manual

